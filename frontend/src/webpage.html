<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1" />
  <title>Location Heatmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <style>
    #map { width: 100%; height: 500px; }
  </style>
</head>
<body>

<h1>Location Heatmap</h1>

<button id="button_locate" onclick="getLocation()">Get my location</button>

<h2>GPS Coordinates</h2>
<p>Latitude: <span id="lat">—</span></p>
<p>Longitude: <span id="long">—</span></p>
<p>Accuracy: <span id="accuracy">—</span></p>
<p>Status: <span id="status">Press the button to get your location.</span></p>

<h2>Map</h2>
<div id="map"></div>

<script src="map_page.js" defer></script>
<script src="measure_page.js" defer></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1" />
  <title>Heatmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #map { 
      width: 100vw; 
      height: 100vh; 
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    .floating-title {
      position: absolute;
      top: 16px;
      right: 16px;
      background: white;
      padding: 10px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 16px;
      font-weight: 500;
      z-index: 10;
      max-width: 300px;
    }
    .floating-title h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .floating-title a {
      display: inline-block;
      margin-top: 4px;
      font-size: 13px;
      color: #1a73e8;
      text-decoration: none;
    }
    .floating-title a:hover {
      text-decoration: underline;
    }

    .poi-div-icon {
      pointer-events: auto;
    }

    .poi-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(33, 37, 41, 0.12);
      border-radius: 18px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      font-size: 13px;
      color: #111;
      white-space: nowrap;
    }

    .poi-icon {
      font-size: 16px;
      line-height: 1;
    }

    .poi-title {
      font-weight: 600;
      color: #111;
    }

    .poi-tooltip {
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="floating-title">
  <h1>SFC Network Heatmap Service</h1>
  <a href="homepage.html">Back to homepage</a>
</div>

<script src="config.js" defer></script>
<script src="map_page.js" defer></script>

</body>
</html>

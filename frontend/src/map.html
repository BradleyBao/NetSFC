<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1, maximum-scale=1" />
  <title>Heatmap</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #map { 
      width: 100vw; 
      height: 100vh; 
      position: absolute;
      top: 0;
      left: 0;
      z-index: 1;
    }
    .floating-title {
      position: absolute;
      top: 16px;
      left: 16px;
      background: white;
      padding: 10px 16px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      font-size: 16px;
      font-weight: 500;
      z-index: 10;
      max-width: 300px;
    }
    .floating-title h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 600;
    }
    .floating-title a {
      display: inline-block;
      margin-top: 4px;
      font-size: 13px;
      color: #1a73e8;
      text-decoration: none;
    }
    .floating-title a:hover {
      text-decoration: underline;
    }

    .poi-div-icon {
      pointer-events: auto;
    }

    .poi-label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 7px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid rgba(33, 37, 41, 0.12);
      border-radius: 14px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.12);
      font-size: 11px;
      color: #111;
      white-space: nowrap;
    }

    .poi-icon {
      font-size: 12px;
      line-height: 1;
    }

    .poi-title {
      font-weight: 600;
      color: #111;
    }

    .poi-tooltip {
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.2);
    }

    .building-panel {
      position: absolute;
      top: 90px;
      left: 16px;
      width: 340px;
      max-height: calc(100vh - 32px);
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.18);
      z-index: 20;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transform: translateX(-120%);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .building-panel.open {
      transform: translateX(0);
      opacity: 1;
    }

    .gm-panel-header {
      position: relative;
      padding: 20px 20px 16px 20px;
      border-bottom: 1px solid #ececec;
    }

    .gm-header-label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #1a73e8;
      margin-bottom: 6px;
    }

    .gm-panel-header h2 {
      margin: 0 0 6px 0;
      font-size: 20px;
      font-weight: 500;
      color: #202124;
      padding-right: 30px;
    }

    .gm-panel-header p {
      margin: 0;
      font-size: 13px;
      color: #5f6368;
      line-height: 1.45;
    }

    .gm-close-btn {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: #f1f3f4;
      font-size: 18px;
      color: #5f6368;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .gm-close-btn:hover { background: #e8eaed; }

    .gm-floor-tabs {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      border-bottom: 1px solid #ececec;
      overflow-x: auto;
    }

    .building-floor-tab {
      flex-shrink: 0;
      padding: 6px 14px;
      border: 1px solid #dadce0;
      border-radius: 20px;
      background: white;
      font-size: 13px;
      font-weight: 500;
      color: #3c4043;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .building-floor-tab:hover { background: #f1f3f4; }
    .building-floor-tab.active {
      background: #1a73e8;
      border-color: #1a73e8;
      color: white;
    }

    .gm-panel-body {
      padding: 16px 20px 20px 20px;
      overflow-y: auto;
    }

    .gm-section { margin-bottom: 18px; }
    .gm-section:last-child { margin-bottom: 0; }

    .gm-section-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #5f6368;
      margin-bottom: 8px;
    }

    .gm-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .gm-list li {
      padding: 9px 10px;
      font-size: 14px;
      color: #202124;
      border-bottom: 1px solid #f1f3f4;
    }
    .gm-list li:last-child { border-bottom: none; }
  </style>
</head>
<body>

<div id="map"></div>

<div id="building-panel" class="building-panel">
  <div class="gm-panel-header">
    <button id="building-panel-close" class="gm-close-btn" aria-label="Close">&times;</button>
    <div class="gm-header-label">Building</div>
    <h2 id="building-panel-name"></h2>
    <p id="building-panel-description"></p>
  </div>

  <div id="building-floor-tabs" class="gm-floor-tabs"></div>

  <div class="gm-panel-body">
    <div class="gm-section">
      <div class="gm-section-label">Classrooms</div>
      <ul id="building-panel-classrooms" class="gm-list"></ul>
    </div>

    <div class="gm-section">
      <div class="gm-section-label">Items</div>
      <ul id="building-panel-items" class="gm-list"></ul>
    </div>
  </div>
</div>

<div class="floating-title">
  <h1>SFC Network Heatmap Service</h1>
  <a href="homepage.html">Back to homepage</a>
</div>

<script src="config.js" defer></script>
<script src="map_page.js" defer></script>

</body>
</html>
